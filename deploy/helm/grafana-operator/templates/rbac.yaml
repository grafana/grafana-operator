{{- if .Values.rbac.create -}}
{{- $rbac := .Files.Get "files/rbac.yaml" | fromYaml  }}
{{- $rbacOpenShift := .Files.Get "files/rbac-openshift.yaml" | fromYaml  }}
{{- $watchNamespaceSelector := trim .Values.watchNamespaceSelector -}}

{{- /*
RBAC behavior:
- Default is to use ClusterRole (and bind it either cluster-wide or via RoleBindings).
- In restricted clusters you may set namespaceScope=true and rbac.useClusterRole=false to render namespaced Role+RoleBinding instead.

Note: watchNamespaceSelector requires cluster-scoped permission to list namespaces and therefore requires a ClusterRole.
*/ -}}
{{- $useClusterRole := true -}}
{{- if hasKey .Values.rbac "useClusterRole" -}}
{{- $useClusterRole = .Values.rbac.useClusterRole -}}
{{- end -}}
{{- $useClusterRole = or (not .Values.namespaceScope) $useClusterRole -}}

{{- if and .Values.namespaceScope (not $useClusterRole) (ne $watchNamespaceSelector "") -}}
{{- fail "watchNamespaceSelector requires cluster-scoped RBAC (ClusterRole). Set rbac.useClusterRole=true or disable watchNamespaceSelector." -}}
{{- end -}}

{{- if $useClusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: {{ include "grafana-operator.fullname" $ }}
  labels:
    {{- include "grafana-operator.labels" $ | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  {{- toYaml $rbac.rules | nindent 2 }}
  {{- if $.Values.isOpenShift }}
  {{- toYaml $rbacOpenShift.rules | nindent 2 -}}
  {{- end }}
  {{- if ne $watchNamespaceSelector "" }}
  - apiGroups:
    - ""
    resources:
    - namespaces
    verbs:
    - get
    - list
  {{- end }}
{{- end }}

{{- /* Namespace scope, one or more namespaces */}}
{{- if .Values.namespaceScope }}
{{- $watchNamespaces := append (splitList "," .Values.watchNamespaces) (include "grafana-operator.namespace" $) | uniq }}
{{- $roleBindingName := include "grafana-operator.fullname" $ -}}
{{- if not $useClusterRole -}}
{{- $roleBindingName = printf "%s-role" (include "grafana-operator.fullname" $) -}}
{{- end -}}
{{- range $watchNamespaces }}
{{- $ns := trim . }}
{{- if $ns }}
{{- if not $useClusterRole }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: {{ include "grafana-operator.fullname" $ }}
  namespace: {{ $ns }}
  labels:
    {{- include "grafana-operator.labels" $ | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  {{- toYaml $rbac.rules | nindent 2 }}
  {{- if $.Values.isOpenShift }}
  {{- toYaml $rbacOpenShift.rules | nindent 2 -}}
  {{- end }}
{{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ $roleBindingName }}
  namespace: {{ $ns }}
  labels:
    {{- include "grafana-operator.labels" $ | nindent 4 }}
    app.kubernetes.io/component: operator
subjects:
  - kind: ServiceAccount
    name: {{ include "grafana-operator.serviceAccountName" $ }}
    namespace: {{ include "grafana-operator.namespace" $ }}
roleRef:
  kind: {{ ternary "ClusterRole" "Role" $useClusterRole }}
  name: {{ include "grafana-operator.fullname" $ }}
  apiGroup: rbac.authorization.k8s.io
{{- end }}
{{- end }}{{- /* range $watchNamespaces */}}

{{- else }}{{- /* namespaceScope */}}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ include "grafana-operator.fullname" $ }}
  labels:
    {{- include "grafana-operator.labels" $ | nindent 4 }}
    app.kubernetes.io/component: operator
roleRef:
  kind: ClusterRole
  name: {{ include "grafana-operator.fullname" $ }}
  apiGroup: rbac.authorization.k8s.io
subjects:
  - kind: ServiceAccount
    name: {{ include "grafana-operator.serviceAccountName" $ }}
    namespace: {{ include "grafana-operator.namespace" $ }}
{{- end }}{{- /* else namespaceScope */}}

{{- /* Lease permissions needed for leaderElection */}}
{{- if .Values.leaderElect }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  namespace: {{ include "grafana-operator.namespace" $ }}
  name: {{ include "grafana-operator.fullname" $ }}-leases
  labels:
    {{- include "grafana-operator.labels" $ | nindent 4 }}
    app.kubernetes.io/component: operator
rules:
  - apiGroups:
    - coordination.k8s.io
    resources:
    - leases
    verbs:
    - get
    - list
    - watch
    - create
    - update
    - patch
    - delete
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: {{ include "grafana-operator.fullname" $ }}-leases
  namespace: {{ include "grafana-operator.namespace" $ }}
  labels:
    {{- include "grafana-operator.labels" $ | nindent 4 }}
    app.kubernetes.io/component: operator
subjects:
  - kind: ServiceAccount
    name: {{ include "grafana-operator.serviceAccountName" $ }}
    namespace: {{ include "grafana-operator.namespace" $ }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: {{ include "grafana-operator.fullname" $ }}-leases
{{- end }}
{{- end }}{{- /* rbac.create */}}
