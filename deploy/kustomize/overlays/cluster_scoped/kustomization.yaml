namespace: grafana

resources:
  - ../../base

patches:
  - target:
      kind: Deployment
      name: grafana-operator-controller-manager
    patch: |-
      apiVersion: apps/v1
      kind: Deployment
      metadata:
        name: grafana-operator-controller-manager
      spec:
        template:
          spec:
            containers:
              - name: manager
                env:
                  - name: ENABLE_LEADER_ELECTION
                    value: "true"

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
