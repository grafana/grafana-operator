apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: (join('-', [$test.metadata.name, 'a']))
  labels:
    test: ($test.metadata.name)
spec:
  config:
    log:
      mode: "console"
    auth:
      disable_login_form: "false"
    security:
      admin_user: ($USER)
      admin_password: ($PASS)
---
apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: (join('-', [$test.metadata.name, 'b']))
  labels:
    test: ($test.metadata.name)
spec:
  config:
    log:
      mode: "console"
    auth:
      disable_login_form: "false"
    security:
      admin_user: ($USER)
      admin_password: ($PASS)