apiVersion: grafana.integreatly.org/v1beta1
kind: Grafana
metadata:
  name: service-accounts
  labels:
    test: service-accounts
status:
  stage: complete
  stageStatus: success
  serviceAccounts:
    - name: grafana-service-account-sa2
      role: Viewer
      (serviceAccountId > `2` && serviceAccountId < `5`): true
      specId: grafana-sa2
      tokens:
        - name: tokena
          secretName: service-accounts-grafana-sa2-tokena
          (tokenId > `1` && tokenId < `6`): true
        - name: tokenb
          secretName: service-accounts-grafana-sa2-tokenb
          (tokenId > `1` && tokenId < `6`): true
    - name: grafana-service-account-sa3
      role: Admin
      isDisabled: true
      (serviceAccountId > `2` && serviceAccountId < `5`): true
      specId: grafana-sa3
      tokens:
        - name: tokenc
          secretName: service-accounts-grafana-sa3-tokenc
          (tokenId > `1` && tokenId < `6`): true
          (time_between(expires, time_utc(time_add($NOW, '23h55m')), time_utc(time_add($NOW, '24h05m')))): true
        - name: tokend
          secretName: service-accounts-grafana-sa3-tokend
          (tokenId > `1` && tokenId < `6`): true
          (time_between(expires, time_utc(time_add($NOW, '27h55m')), time_utc(time_add($NOW, '28h05m')))): true
---
apiVersion: v1
data:
  (length(token) > `0`): true
kind: Secret
metadata:
  labels:
    app: grafana-serviceaccount-token
  name: service-accounts-grafana-sa2-tokena
  ownerReferences:
    - apiVersion: grafana.integreatly.org/v1beta1
      blockOwnerDeletion: true
      controller: true
      kind: Grafana
      name: service-accounts
---
apiVersion: v1
data:
  (length(token) > `0`): true
kind: Secret
metadata:
  labels:
    app: grafana-serviceaccount-token
  name: service-accounts-grafana-sa2-tokenb
  ownerReferences:
    - apiVersion: grafana.integreatly.org/v1beta1
      blockOwnerDeletion: true
      controller: true
      kind: Grafana
      name: service-accounts
---
apiVersion: v1
data:
  (length(token) > `0`): true
kind: Secret
metadata:
  labels:
    app: grafana-serviceaccount-token
  name: service-accounts-grafana-sa3-tokenc
  ownerReferences:
    - apiVersion: grafana.integreatly.org/v1beta1
      blockOwnerDeletion: true
      controller: true
      kind: Grafana
      name: service-accounts
---
apiVersion: v1
data:
  (length(token) > `0`): true
kind: Secret
metadata:
  labels:
    app: grafana-serviceaccount-token
  name: service-accounts-grafana-sa3-tokend
  ownerReferences:
    - apiVersion: grafana.integreatly.org/v1beta1
      blockOwnerDeletion: true
      controller: true
      kind: Grafana
      name: service-accounts
