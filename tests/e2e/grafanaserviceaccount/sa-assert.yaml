apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaServiceAccount
metadata:
  name: ($test.metadata.name)
status:
  conditions:
  - reason: ApplySuccessful
    status: "True"
    type: ServiceAccountSynchronized
  instances:
    - grafanaRefName: ($test.metadata.name)
      grafanaRefNamespace: ($namespace)
      serviceAccountID: 2
      tokens:
        - name: (join('-', [$test.metadata.name, 'default-token']))
          secretName: (join('-', [$test.metadata.name, 'default-token']))
          tokenId: 1
