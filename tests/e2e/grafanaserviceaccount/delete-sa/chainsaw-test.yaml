        #     name: ($test.metadata.name)
        #     for:
        #       deletion: {}
        # - assert:
        #     resource:
        #       apiVersion: grafana.integreatly.org/v1beta1
        #       kind: Grafana
        #       metadata:
        #         name: ($test.metadata.name)
        #       status:
        #         serviceaccounts:
        #           - (join('/', [$namespace, $test.metadata.name, '2']))