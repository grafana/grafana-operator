# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: delete-sa
spec:
  bindings:
    - name: USER
      value: root
    - name: PASS
      value: secret
  steps:
    - try:
        - apply:
            file: ../grafana-resource.yaml
        - assert:
            file: ../grafana-ready.yaml
        - assert:
            resource:
              apiVersion: v1
              kind: Pod
              metadata:
                (contains(name, (join('-', [$test.metadata.name, 'deployment'])))): true
        - wait:
            apiVersion: v1
            kind: Pod
            timeout: 1m
            for:
              condition:
                name: Ready
                value: 'true'
        - apply:
            file: ../sa-resource.yaml
        - assert:
            file: ../sa-assert.yaml
        - assert:
            file: ../grafana-assert.yaml
        - delete:
            ref:
              apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaServiceAccount
              name: ($test.metadata.name)
            expect:
            - match:
                apiVersion: grafana.integreatly.org/v1beta1
                kind: GrafanaServiceAccount
                name: ($test.metadata.name)
              check:
                ($error != null): false
        # - wait:
        #     apiVersion: grafana.integreatly.org/v1beta1
