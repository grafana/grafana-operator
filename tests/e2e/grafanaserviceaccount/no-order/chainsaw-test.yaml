# yaml-language-server: $schema=https://raw.githubusercontent.com/kyverno/chainsaw/main/.schemas/json/test-chainsaw-v1alpha1.json
apiVersion: chainsaw.kyverno.io/v1alpha1
kind: Test
metadata:
  name: no-order
spec:
  bindings:
    - name: USER
      value: root
    - name: PASS
      value: secret
  steps:
    - try:
        - apply:
            file: ../grafana-resource.yaml
        - apply:
            file: ../sa-resource.yaml
        - assert:
            resource:
              apiVersion: grafana.integreatly.org/v1beta1
              kind: GrafanaServiceAccount
              metadata:
                name: ($test.metadata.name)
              status:
                conditions:
                - reason: ApplySuccessful
                  status: "True"
                  type: ServiceAccountSynchronized
                id: 2
                tokens:
                - name: (join('-', [$test.metadata.name, 'default-token']))
                  secretName: (join('-', [$test.metadata.name, 'default-token']))
                  tokenId: 1
        - assert:
            resource:
              apiVersion: grafana.integreatly.org/v1beta1
              kind: Grafana
              metadata:
                name: ($test.metadata.name)
              status:
                serviceaccounts:
                  - (join('/', [$namespace, $test.metadata.name, '2']))