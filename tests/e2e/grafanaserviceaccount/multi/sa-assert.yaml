apiVersion: grafana.integreatly.org/v1beta1
kind: GrafanaServiceAccount
metadata:
  name: sa1
status:
  conditions:
  - reason: ApplySuccessful
    status: "True"
    type: ServiceAccountSynchronized
  instances:
  - grafanaName: grafana-a
    grafanaNamespace: ($namespace)
    tokens:
      - name: sa1-default-token
        secretName: sa1-grafana-a-sa1-default-token
  - grafanaName: grafana-b
    grafanaNamespace: ($namespace)
    tokens:
      - name: sa1-default-token
        secretName: sa1-grafana-b-sa1-default-token
  - grafanaName: grafana-c
    grafanaNamespace: ($namespace)
    tokens:
      - name: sa1-default-token
        secretName: sa1-grafana-c-sa1-default-token
---
